<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Inter', sans-serif;
    background: #000; color: #fff;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #wrapper {
    width: 100vw; height: 100vh;
    position: relative; overflow: hidden;
  }

  /* ═══ SLIDES ═══ */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
    will-change: opacity;
  }
  .slide.active { opacity: 1; pointer-events: auto; z-index: 2; }
  .slide.prev { opacity: 0; z-index: 1; transition: opacity 2.5s ease-in-out; }
  /* Instant cut: no transition when coming from intro */
  .slide.instant { transition: none; }
  .intro-slide.instant-out { transition: none; opacity: 0; }

  /* ═══ NEWS SLIDE DESIGN ═══ */
  .news-bg-full {
    position: absolute; inset: -5%;
    width: 110%; height: 110%;
    object-fit: cover; object-position: center;
    filter: brightness(0.55);
    transform: scale(1);
    transition: transform 12s ease-out;
    will-change: transform;
  }
  .slide.active .news-bg-full { transform: scale(1.08); }

  .news-gradient { position: absolute; inset: 0; z-index: 1; }
  .news-gradient-bottom {
    background: linear-gradient(0deg,
      rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 25%,
      rgba(0,0,0,0.1) 55%, transparent 100%);
  }
  .news-gradient-vignette {
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
  }

  .news-content {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 5vh 5vw;
  }

  .news-source-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2.5vh;
  }
  .news-source-bar img.source-logo {
    height: min(2.4vw, 3.8vh);
    object-fit: contain;
  }
  .news-source-bar .news-ago {
    font-size: min(0.9vw, 1.4vh);
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    padding: 0.4vh 1vw;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .news-title {
    font-size: min(3.5vw, 5.5vh);
    font-weight: 900; line-height: 1.15;
    color: #fff; margin-bottom: 2vh;
    max-width: 70%;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .news-desc-area {
    max-width: 55%; max-height: 18vh;
    overflow: hidden; position: relative;
  }
  .news-desc-area p {
    font-size: min(1.2vw, 1.9vh);
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }

  /* ── Source accents ── */
  .nos-accent .source-logo { filter: none; }
  .nos-accent::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 100%; height: 4px; z-index: 3;
    background: linear-gradient(90deg, #f36d21, #f36d21 30%, transparent);
  }
  .nyt-accent .news-title { color: #f0f0f0; }
  .nyt-accent .source-logo { filter: invert(1); height: min(1.8vw, 2.8vh) !important; }
  .nyt-accent::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 100%; height: 4px; z-index: 3;
    background: linear-gradient(90deg, #999, #999 30%, transparent);
  }
  .sky-accent .news-title { color: #e8eef8; }
  .sky-accent .source-logo { filter: none; }
  .sky-accent::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 100%; height: 4px; z-index: 3;
    background: linear-gradient(90deg, #c41230, #c41230 30%, transparent);
  }

  /* ═══ INTRO SLIDES ═══ */
  .intro-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    pointer-events: none;
    z-index: 1;
    will-change: opacity;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2.5vh;
  }
  .intro-slide.active { opacity: 1; z-index: 2; }
  .intro-slide.prev { opacity: 0; z-index: 1; transition: opacity 2s ease-in-out; }
  .intro-bg {
    position: absolute; inset: 0;
  }
  .intro-bg.nos-bg { background: radial-gradient(ellipse at center, #1a0d00 0%, #0a0a0a 70%); }
  .intro-bg.nyt-bg { background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%); }
  .intro-bg.sky-bg { background: radial-gradient(ellipse at center, #1a050a 0%, #0a0a0a 70%); }
  .intro-glow {
    position: absolute;
    width: 50vmax; height: 50vmax;
    border-radius: 50%;
    opacity: 0.15;
  }
  .intro-glow.nos-glow { background: radial-gradient(circle, #f36d21, transparent 70%); }
  .intro-glow.nyt-glow { background: radial-gradient(circle, #f0f0f0, transparent 70%); }
  .intro-glow.sky-glow { background: radial-gradient(circle, #c41230, transparent 70%); }
  .intro-logo {
    position: relative; z-index: 2;
    height: min(8vw, 12vh);
    object-fit: contain;
  }
  .intro-logo.nyt-logo { filter: invert(1); }
  .intro-label {
    position: relative; z-index: 2;
    font-size: min(1.8vw, 2.8vh);
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.5;
  }
  .intro-line {
    position: relative; z-index: 2;
    height: 2px; width: min(12vw, 150px);
  }
  .intro-line.nos-line { background: #f36d21; }
  .intro-line.nyt-line { background: #999; }
  .intro-line.sky-line { background: #c41230; }

  /* ═══ LOADING SCREEN ═══ */
  #loading-screen {
    position: fixed; inset: 0; z-index: 100;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 3vh;
    transition: opacity 0.8s ease;
  }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .loading-logos {
    display: flex; align-items: center; gap: 3vw;
  }
  .loading-logos img {
    height: min(3vw, 4.5vh);
    object-fit: contain;
    opacity: 0.3;
    transition: opacity 0.5s ease;
  }
  .loading-logos img.loaded { opacity: 1; }
  .loading-logos img.logo-nyt { filter: invert(1); }
  .loading-spinner {
    width: min(3vw, 4vh); height: min(3vw, 4vh);
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logos">
    <img id="ll-nos" src="https://static.cdnlogo.com/logos/n/78/nos.svg" alt="NOS">
    <img id="ll-nyt" class="logo-nyt" src="https://upload.wikimedia.org/wikipedia/commons/7/77/The_New_York_Times_logo.png" alt="NYT">
    <img id="ll-sky" src="https://static.cdnlogo.com/logos/s/65/sky-news.svg" alt="Sky">
  </div>
  <div class="loading-spinner"></div>
</div>

<div id="wrapper">
  <!-- NOS INTRO -->
  <div class="intro-slide" id="intro-nos" data-duration="5000" data-source="nos" data-intro="true">
    <div class="intro-bg nos-bg"></div>
    <div class="intro-glow nos-glow"></div>
    <img class="intro-logo" src="https://static.cdnlogo.com/logos/n/78/nos.svg" alt="NOS">
    <div class="intro-line nos-line"></div>
    <span class="intro-label">Headlines</span>
  </div>

  <!-- NYT INTRO -->
  <div class="intro-slide" id="intro-nyt" data-duration="5000" data-source="nyt" data-intro="true">
    <div class="intro-bg nyt-bg"></div>
    <div class="intro-glow nyt-glow"></div>
    <img class="intro-logo nyt-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/77/The_New_York_Times_logo.png" alt="NYT">
    <div class="intro-line nyt-line"></div>
    <span class="intro-label">Headlines</span>
  </div>

  <!-- SKY INTRO -->
  <div class="intro-slide" id="intro-sky" data-duration="5000" data-source="sky" data-intro="true">
    <div class="intro-bg sky-bg"></div>
    <div class="intro-glow sky-glow"></div>
    <img class="intro-logo" src="https://static.cdnlogo.com/logos/s/65/sky-news.svg" alt="Sky News">
    <div class="intro-line sky-line"></div>
    <span class="intro-label">Headlines</span>
  </div>

  <!-- NOS 1 -->
  <div class="slide nos-accent" id="nos-0" data-duration="15000" data-source="nos">
    <img class="news-bg-full" id="nos-img-0" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://static.cdnlogo.com/logos/n/78/nos.svg" alt="NOS">
        <span class="news-ago" id="nos-ago-0"></span>
      </div>
      <h1 class="news-title" id="nos-title-0"></h1>
      <div class="news-desc-area" id="nos-desc-area-0"><p id="nos-desc-0"></p></div>
    </div>
  </div>

  <!-- NOS 2 -->
  <div class="slide nos-accent" id="nos-1" data-duration="15000" data-source="nos">
    <img class="news-bg-full" id="nos-img-1" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://static.cdnlogo.com/logos/n/78/nos.svg" alt="NOS">
        <span class="news-ago" id="nos-ago-1"></span>
      </div>
      <h1 class="news-title" id="nos-title-1"></h1>
      <div class="news-desc-area" id="nos-desc-area-1"><p id="nos-desc-1"></p></div>
    </div>
  </div>

  <!-- NYT 1 -->
  <div class="slide nyt-accent" id="nyt-0" data-duration="10000" data-source="nyt">
    <img class="news-bg-full" id="nyt-img-0" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/77/The_New_York_Times_logo.png" alt="NYT">
        <span class="news-ago" id="nyt-ago-0"></span>
      </div>
      <h1 class="news-title" id="nyt-title-0"></h1>
      <div class="news-desc-area" id="nyt-desc-area-0"><p id="nyt-desc-0"></p></div>
    </div>
  </div>

  <!-- NYT 2 -->
  <div class="slide nyt-accent" id="nyt-1" data-duration="10000" data-source="nyt">
    <img class="news-bg-full" id="nyt-img-1" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/77/The_New_York_Times_logo.png" alt="NYT">
        <span class="news-ago" id="nyt-ago-1"></span>
      </div>
      <h1 class="news-title" id="nyt-title-1"></h1>
      <div class="news-desc-area" id="nyt-desc-area-1"><p id="nyt-desc-1"></p></div>
    </div>
  </div>

  <!-- SKY 1 -->
  <div class="slide sky-accent" id="sky-0" data-duration="10000" data-source="sky">
    <img class="news-bg-full" id="sky-img-0" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://static.cdnlogo.com/logos/s/65/sky-news.svg" alt="Sky News">
        <span class="news-ago" id="sky-ago-0"></span>
      </div>
      <h1 class="news-title" id="sky-title-0"></h1>
      <div class="news-desc-area" id="sky-desc-area-0"><p id="sky-desc-0"></p></div>
    </div>
  </div>

  <!-- SKY 2 -->
  <div class="slide sky-accent" id="sky-1" data-duration="10000" data-source="sky">
    <img class="news-bg-full" id="sky-img-1" src="" alt="">
    <div class="news-gradient news-gradient-bottom"></div>
    <div class="news-gradient news-gradient-vignette"></div>
    <div class="news-content">
      <div class="news-source-bar">
        <img class="source-logo" src="https://static.cdnlogo.com/logos/s/65/sky-news.svg" alt="Sky News">
        <span class="news-ago" id="sky-ago-1"></span>
      </div>
      <h1 class="news-title" id="sky-title-1"></h1>
      <div class="news-desc-area" id="sky-desc-area-1"><p id="sky-desc-1"></p></div>
    </div>
  </div>
</div>

<script>
// ═══ TIME AGO ═══
function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'Zojuist';
  if (s < 3600) return Math.floor(s / 60) + ' min geleden';
  if (s < 86400) return Math.floor(s / 3600) + ' uur geleden';
  return Math.floor(s / 86400) + ' dag(en) geleden';
}

// ═══ NEWS ═══
const PH = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect fill="#111" width="1920" height="1080"/></svg>'
);

function parseRSSItems(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  return Array.from(doc.querySelectorAll('item')).map(item => {
    const get = tag => item.querySelector(tag)?.textContent || '';
    let img = '';
    const media = item.querySelector('content[url], thumbnail[url]');
    if (media) img = media.getAttribute('url');
    if (!img) {
      const enc = item.querySelector('enclosure[url]');
      if (enc && (enc.getAttribute('type') || '').startsWith('image')) img = enc.getAttribute('url');
    }
    if (!img) {
      const m = get('description').match(/<img[^>]+src="([^"]+)"/);
      if (m) img = m[1];
    }
    const tmp = document.createElement('div');
    tmp.innerHTML = get('description');
    return { title: get('title'), description: tmp.textContent || '', pubDate: get('pubDate'), image: img };
  });
}

async function fetchRSS(url) {
  // Try corsproxy (fresh data)
  try {
    const resp = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const xml = await resp.text();
    const items = parseRSSItems(xml);
    if (items.length) return items;
  } catch (e) { console.warn('corsproxy failed:', e.message); }

  // Fallback: rss2json (cached but reliable)
  try {
    const resp = await fetch('https://api.rss2json.com/v1/api.json?count=10&rss_url=' + encodeURIComponent(url));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.items?.length) {
      return data.items.map(item => {
        const tmp = document.createElement('div');
        tmp.innerHTML = item.description;
        return {
          title: item.title,
          description: tmp.textContent || '',
          pubDate: item.pubDate,
          image: item.thumbnail || item.enclosure?.link || (() => { const m = item.description?.match(/<img[^>]+src="([^"]+)"/); return m ? m[1] : ''; })()
        };
      });
    }
  } catch (e) { console.warn('rss2json failed:', e.message); }

  return [];
}

async function fetchNews(url, pre, n) {
  try {
    const items = await fetchRSS(url);
    if (!items.length) return;
    items.slice(0, n).forEach((item, i) => {
      const el = id => document.getElementById(pre + '-' + id + '-' + i);
      const title = el('title'), desc = el('desc'), img = el('img'), ago = el('ago');
      if (title) title.textContent = item.title;
      if (ago) { ago.textContent = timeAgo(item.pubDate); ago.dataset.pubdate = item.pubDate; }
      if (desc) desc.textContent = item.description;
      if (img) img.src = item.image || PH;
    });
  } catch (e) { console.warn('News err (' + pre + '):', e); }
}

function loadAll() {
  return Promise.all([
    fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2),
    fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/World.xml', 'nyt', 2),
    fetchNews('https://feeds.skynews.com/feeds/rss/world.xml', 'sky', 2)
  ]);
}

// ═══ AUTO-SCROLL ═══
function startScroll(slideEl) {
  const area = slideEl.querySelector('.news-desc-area');
  if (!area) return;
  const p = area.querySelector('p');
  if (!p) return;
  p.style.transition = 'none';
  p.style.transform = 'translateY(0)';
  void p.offsetHeight;
  const ov = p.scrollHeight - area.clientHeight;
  if (ov > 10) {
    setTimeout(() => {
      p.style.transition = 'transform ' + (ov / 28) + 's linear';
      p.style.transform = 'translateY(-' + ov + 'px)';
    }, 3500);
  }
}

// ═══ SLIDESHOW ═══
// Slide order: NOS intro, NOS 1, NOS 2, NYT intro, NYT 1, NYT 2, SKY intro, SKY 1, SKY 2
const allSlides = [
  document.getElementById('intro-nos'),
  document.getElementById('nos-0'),
  document.getElementById('nos-1'),
  document.getElementById('intro-nyt'),
  document.getElementById('nyt-0'),
  document.getElementById('nyt-1'),
  document.getElementById('intro-sky'),
  document.getElementById('sky-0'),
  document.getElementById('sky-1')
];
let cur = 0, timer = null;

function activateSlide(i, instant) {
  const next = allSlides[i];
  if (instant) next.classList.add('instant');
  next.classList.add('active');
  cur = i;

  // Ken Burns for news slides
  const newBg = next.querySelector('.news-bg-full');
  if (newBg) {
    newBg.style.transition = 'none';
    newBg.style.transform = 'scale(1)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      newBg.style.transition = 'transform 12s ease-out';
      newBg.style.transform = 'scale(1.08)';
      // Remove instant class after first frame so future transitions are normal
      if (instant) next.classList.remove('instant');
    }));
  }

  if (!next.dataset.intro) startScroll(next);

  const ago = next.querySelector('.news-ago');
  if (ago?.dataset.pubdate) ago.textContent = timeAgo(ago.dataset.pubdate);

  const dur = parseInt(next.dataset.duration) || 15000;
  clearTimeout(timer);

  // Stop after the last slide (don't loop)
  if (i < allSlides.length - 1) {
    timer = setTimeout(() => showSlide(i + 1), dur);
  }
}

function deactivateSlide(i, instant) {
  const s = allSlides[i];
  if (instant) {
    s.classList.add('instant-out');
    s.classList.remove('active');
    setTimeout(() => s.classList.remove('instant-out'), 50);
  } else {
    s.classList.remove('active');
    s.classList.add('prev');
    setTimeout(() => {
      s.classList.remove('prev');
      const bg = s.querySelector('.news-bg-full');
      if (bg) { bg.style.transition = 'none'; bg.style.transform = 'scale(1)'; }
    }, 2600);
  }
}

function showSlide(i) {
  const prev = allSlides[cur];
  const isFromIntro = prev && prev.dataset.intro;
  deactivateSlide(cur, isFromIntro);
  activateSlide(i, isFromIntro);
}

// ═══ PRELOAD IMAGE ═══
function preloadImage(src) {
  return new Promise(resolve => {
    if (!src || src === PH) return resolve();
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve; // don't block on failed images
    img.src = src;
    // timeout safety: resolve after 8s even if image hasn't loaded
    setTimeout(resolve, 8000);
  });
}

// ═══ WAIT FOR PAGE VISIBLE (Yodeck loads pages in background) ═══
function waitForVisible() {
  return new Promise(resolve => {
    if (document.visibilityState === 'visible') return resolve();
    const handler = () => {
      if (document.visibilityState === 'visible') {
        document.removeEventListener('visibilitychange', handler);
        resolve();
      }
    };
    document.addEventListener('visibilitychange', handler);
  });
}

// ═══ INIT ═══
const loadingScreen = document.getElementById('loading-screen');

async function initSignage() {
  // Load all feeds, lighting up logos as each source completes
  const nosP = fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2)
    .then(() => document.getElementById('ll-nos').classList.add('loaded'));
  const nytP = fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/World.xml', 'nyt', 2)
    .then(() => document.getElementById('ll-nyt').classList.add('loaded'));
  const skyP = fetchNews('https://feeds.skynews.com/feeds/rss/world.xml', 'sky', 2)
    .then(() => document.getElementById('ll-sky').classList.add('loaded'));

  await Promise.all([nosP, nytP, skyP]);

  // Preload all slide background images
  const imgPromises = Array.from(document.querySelectorAll('.news-bg-full')).map(img =>
    preloadImage(img.src)
  );
  await Promise.all(imgPromises);

  // Wait until page is actually visible on screen (Yodeck pre-renders in background)
  await waitForVisible();

  // Small extra delay to ensure Yodeck has fully switched to this page
  await new Promise(r => setTimeout(r, 300));

  // Everything ready — hide loading screen and start
  loadingScreen.classList.add('fade-out');
  await new Promise(r => setTimeout(r, 800));
  loadingScreen.style.display = 'none';

  activateSlide(0);
}

initSignage();
</script>
</body>
</html>
